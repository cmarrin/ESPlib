<!DOCTYPE html>

        <h1 id="title">PostLightController</h1>
        <div id="uipanel">
            <div class="widget power-button">
                <label class="widget-label" for="powerInput">Post Lights On</label>
                <label class="widget-control switch">

                    <span class="slider round"></span>
                </label>

            <div class="widget color-picker">
                <label class="widget-label" for="colorInput">Color</label>
                <input class="widget-control" type="color" id="colorInput" value="#ff0000">
            </div>
        </div>
    </div>
